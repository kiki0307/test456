<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exp 4 — Wan 2.2 ATI (ComfyUI) · FL Path Animator Node</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="site-header">
    <div class="header-facets" aria-hidden="true"></div>
    <div class="header-inner">
      <h1 class="exp-title">Exp 4 [Wan 2.2 ATI (Comfy UI)]</h1>
      <p class="exp-sub sub-1">NODE-BASED TRAJECTORY CONTROL</p>
      <p class="exp-sub sub-2">ANALYSIS [FL Path Animator Node]</p>
    </div>
  </header>

  <!-- ===== MAIN ===== -->
  <main class="content">

    <p class="section-label">FL Path Animator Node</p>

    <!-- Hero: field clip + path-animator panel -->
    <figure class="hero">
      <div class="hero-stage">
        <div class="hero-scene"></div>
        <div class="hero-panel" aria-label="FL Path Animator panel">
          <div class="hp-toolbar">
            <span class="hp-tool hp-active"></span>
            <span class="hp-tool"></span>
            <span class="hp-tool"></span>
            <span class="hp-tool"></span>
            <span class="hp-tool"></span>
            <span class="hp-tool"></span>
          </div>
          <ul class="hp-paths">
            <li class="hp-path"><span class="dot dot-orange"></span><span class="hp-name">Path 1</span><span class="hp-meta">Status (10 pts)</span><span class="hp-x">×</span></li>
            <li class="hp-path"><span class="dot dot-blue"></span><span class="hp-name">Path 2</span><span class="hp-meta">Status (8 pts)</span><span class="hp-x">×</span></li>
            <li class="hp-path"><span class="dot dot-green"></span><span class="hp-name">Path 3</span><span class="hp-meta">Status (6 pts)</span><span class="hp-x">×</span></li>
          </ul>
        </div>
      </div>
    </figure>

    <!-- Video grid (generated by script.js) -->
    <section id="grid" class="video-grid" aria-label="Camera movement test clips"></section>

  </main>

  <script src="script.js"></script>
</body>
</html>
